# KPI catalog. Each entry maps a kpi_code to one source block (ins_tempo OR eurostat).
# Add KPIs by appending entries; runner picks them up on next ingest.
#
# Levels: commune (LAU2), county (NUTS3), region (NUTS2), country.
# Region-level KPIs are inherited by all locations within RO11 (NW Romania)
# via the report endpoint's hierarchy walk.

# =============================================================================
# Demographics (Category 4 of brief)
# =============================================================================

- kpi_code: pop_total
  name_en: Total population
  name_ro: Populația totală
  unit: persons
  category: Demographics
  aggregation_level: commune
  description: Total resident population, all ages, both sexes.
  ins_tempo:
    matrix: POP107D
    dims: { SEX: "Total", AGE: "Total", URBAN_RURAL: "Total" }
    geo_level: lau2

- kpi_code: active_population
  name_en: Working-age population (15-64)
  name_ro: Populația activă (15-64 ani)
  unit: persons
  category: Demographics
  aggregation_level: commune
  description: Resident population aged 15 to 64.
  ins_tempo:
    matrix: POP107D
    dims: { SEX: "Total", AGE: "15-64", URBAN_RURAL: "Total" }
    geo_level: lau2

- kpi_code: pop_density
  name_en: Population density
  name_ro: Densitatea populației
  unit: persons/km²
  category: Demographics
  aggregation_level: county
  description: Inhabitants per km² at NUTS3 level.
  eurostat:
    dataset: demo_r_d3dens
    filters: {}
    geo_level: nuts3

- kpi_code: pop_county_total
  name_en: County total population
  name_ro: Populație totală județ
  unit: persons
  category: Demographics
  aggregation_level: county
  description: Total resident population at NUTS3 (county) level, all ages.
  eurostat:
    dataset: demo_r_pjangrp3
    filters: { sex: "T", age: "TOTAL" }
    geo_level: nuts3

- kpi_code: pop_15_64
  name_en: Working-age population at county level (15-64)
  name_ro: Populația activă județ (15-64)
  unit: persons
  category: Demographics
  aggregation_level: county
  description: Population aged 15-64 at NUTS3 level.
  eurostat:
    dataset: demo_r_pjangrp3
    filters: { sex: "T", age: "Y15-64" }
    geo_level: nuts3

# =============================================================================
# Macro-Economy (Category 2 of brief)
# =============================================================================

- kpi_code: gdp_per_capita
  name_en: Regional GDP per capita
  name_ro: PIB pe locuitor
  unit: EUR
  category: Macro-Economy
  aggregation_level: county
  description: GDP per inhabitant, NUTS3, current prices in EUR.
  eurostat:
    dataset: nama_10r_3gdp
    filters: { unit: "EUR_HAB" }
    geo_level: nuts3

- kpi_code: gdp_total
  name_en: Regional GDP (total)
  name_ro: PIB regional total
  unit: million EUR
  category: Macro-Economy
  aggregation_level: county
  description: Gross domestic product, NUTS3, current prices, millions of EUR.
  eurostat:
    dataset: nama_10r_3gdp
    filters: { unit: "MIO_EUR" }
    geo_level: nuts3

- kpi_code: gva_total
  name_en: Gross value added (all sectors)
  name_ro: Valoare adăugată brută total
  unit: million EUR
  category: Macro-Economy
  aggregation_level: county
  description: Total GVA at basic prices, all NACE sectors, NUTS3.
  eurostat:
    dataset: nama_10r_3gva
    filters: { unit: "MIO_EUR", nace_r2: "TOTAL" }
    geo_level: nuts3

# =============================================================================
# Labor Market (Category 9 of brief)
# =============================================================================

- kpi_code: gross_monthly_salary
  name_en: Average gross monthly nominal earnings
  name_ro: Câștigul salarial mediu nominal brut lunar
  unit: RON
  category: Labor Market
  aggregation_level: county
  description: Average gross nominal earnings, monthly, all sectors.
  ins_tempo:
    matrix: FOM104D
    dims: { CAEN: "Total" }
    geo_level: nuts3

- kpi_code: unemployment_rate
  name_en: Registered unemployment rate
  name_ro: Rata șomajului înregistrat
  unit: percent
  category: Labor Market
  aggregation_level: county
  description: Registered unemployed as a share of the active population.
  ins_tempo:
    matrix: SOM101A
    dims: { SEX: "Total" }
    geo_level: nuts3

- kpi_code: employment_total
  name_en: Total employment (persons)
  name_ro: Ocupare totală
  unit: thousand persons
  category: Labor Market
  aggregation_level: county
  description: Total employment, all NACE sectors, NUTS3.
  eurostat:
    dataset: nama_10r_3empers
    filters: { wstatus: "EMP", nace_r2: "TOTAL", unit: "THS" }
    geo_level: nuts3

# =============================================================================
# Innovation / R&D (Category 12 of brief) — NUTS2 region-level
# =============================================================================

- kpi_code: rd_expenditure_pct_gdp
  name_en: R&D expenditure (% of GDP)
  name_ro: Cheltuieli de cercetare-dezvoltare (% PIB)
  unit: percent
  category: Innovation
  aggregation_level: region
  description: Gross domestic expenditure on R&D as share of GDP, NUTS2 region.
  eurostat:
    dataset: rd_e_gerdreg
    filters: { sectperf: "TOTAL", unit: "PC_GDP" }
    geo_level: nuts2

- kpi_code: rd_personnel_fte
  name_en: R&D personnel (full-time equivalent)
  name_ro: Personal CD în echivalent normă întreagă
  unit: FTE
  category: Innovation
  aggregation_level: region
  description: Total R&D personnel in FTE, NUTS2 region, all sectors.
  eurostat:
    dataset: rd_p_persreg
    filters: { sectperf: "TOTAL", prof_pos: "TOTAL", sex: "T", unit: "FTE" }
    geo_level: nuts2

- kpi_code: high_tech_employment_pct
  name_en: Employment in high-tech sectors
  name_ro: Ocupare în sectoare de înaltă tehnologie
  unit: percent
  category: Innovation
  aggregation_level: region
  description: Share of employment in high-tech sectors (manufacturing + KIS), NUTS2.
  eurostat:
    dataset: htec_emp_reg2
    filters: { unit: "PC_EMP", nace_r2: "HTC", sex: "T" }
    geo_level: nuts2

# =============================================================================
# Tourism (Category 3 of brief) — NUTS2 region-level
# =============================================================================

- kpi_code: tourism_arrivals
  name_en: Tourist arrivals per year
  name_ro: Sosiri turiști pe an
  unit: persons
  category: Quality of Life
  aggregation_level: region
  description: Arrivals at tourist accommodation establishments, NUTS2 region.
  eurostat:
    dataset: tour_occ_arn2
    filters: { c_resid: "TOTAL", unit: "NR", nace_r2: "I551-I553" }
    geo_level: nuts2

- kpi_code: tourism_nights
  name_en: Tourist overnight stays per year
  name_ro: Înnoptări turiști pe an
  unit: nights
  category: Quality of Life
  aggregation_level: region
  description: Nights spent at tourist accommodation establishments, NUTS2.
  eurostat:
    dataset: tour_occ_nin2
    filters: { c_resid: "TOTAL", unit: "NR", nace_r2: "I551-I553" }
    geo_level: nuts2
