services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: innoinvest
      POSTGRES_USER: innoinvest
      POSTGRES_PASSWORD: innoinvest
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innoinvest -d innoinvest"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg://innoinvest:innoinvest@db:5432/innoinvest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  seed:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg://innoinvest:innoinvest@db:5432/innoinvest
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "innoinvest seed && innoinvest ingest"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on: [api]
    ports:
      - "3000:3000"

volumes:
  db_data:
